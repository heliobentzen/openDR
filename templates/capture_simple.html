<!DOCTYPE html>
<html>
<head>
  <title>Capture_Image</title>
  <!--Importing Bootstrap here-->
  <link href="{{ url_for('static',filename='css/bootstrap.min.css')}}" rel="stylesheet">
  <style>
        .container-fluid{
	    max-width: 800px;
	    padding: 2px;   
        }
        button{
	    width: 70px;
            height : 65px;
	    margin-left: 2px;
	    border: none;
	    background-color: #33cccc;
	    text-align:center;
	    color: white;
            } 
        button:active{
	    background-color:#00ff99
            }
        button:hover{
	    background-color: #009999;
            }
        body{
	    background-color: #000000;
            }
        #grade {
            background:black;
            color: white;
            font-weight: bold;
            font-size: 16px;
            position:fixed;
            right:0;
            height: 100%;
            width:10%;
            padding-top: 40px;
            font-family: Helvetica;
            display:block;
            text-align: right;
            }
        #gradcam-panel {
            background: #111;
            color: #eee;
            font-family: Helvetica, sans-serif;
            font-size: 13px;
            margin-top: 10px;
            padding: 8px;
            border: 1px solid #33cccc;
            border-radius: 4px;
            }
        #gradcam-panel img {
            max-width: 100%;
            margin-top: 6px;
            border: 1px solid #33cccc;
            }
        #gradcam-panel a {
            color: #33cccc;
            }
  </style>
  </head>
  <body>
     <div class="container-fluid" > 
      <div  id="grade" class="">{{ grades.get('grade', '') }}</div>
      <div id="buttonarea">
        <table border="0" class="table">
          {% for o in params %}
        <tr>
        <td>
          <form method="post">
            <button class="button_style" name="d" value="{{o}}"> {{o}}</button>
          </form>
        </td>
        </tr>
      {% endfor %}
        </table>
      </div>
      {% if overlay_filename %}
      <div id="gradcam-panel">
        <strong>Grad-CAM Explanation</strong><br>
        DR Label: {{ dr_label }} &nbsp;|&nbsp;
        Confidence: {{ "%.1f"|format(confidence * 100) }}% &nbsp;|&nbsp;
        Lesion regions: {{ lesion_count }}<br>
        <img src="{{ url_for('serve_image', filename=overlay_filename) }}"
             alt="Grad-CAM heatmap overlay"><br>
        <a href="{{ url_for('serve_image', filename=json_filename) }}"
           download="{{ json_filename }}">&#x2B07; Download audit JSON</a>
      </div>
      {% endif %}
    </div>
  </body>
</html>
