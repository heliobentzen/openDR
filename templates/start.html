<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OWL – Start</title>
  <link href="{{ url_for('static', filename='css/tailwind.css') }}" rel="stylesheet">
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-white">
  <main class="min-h-screen flex items-center justify-center p-6">
    <a
      href="{{ url_for('main') }}"
      class="group w-full max-w-2xl rounded-3xl border border-slate-700 bg-slate-900/80 shadow-2xl backdrop-blur p-8 md:p-10 transition hover:border-amber-400/70 hover:shadow-amber-500/10"
      aria-label="Open OWL patient session"
    >
      <div class="flex flex-col md:flex-row items-center gap-8">
        <img
          src="{{ url_for('static', filename='image/owlLogo.jpg') }}"
          alt="OWL logo"
          class="w-28 h-28 rounded-2xl object-cover border border-slate-700"
        >
        <div class="text-center md:text-left">
          <p class="text-xs uppercase tracking-[0.3em] text-slate-400">openDR platform</p>
          <h1 class="mt-2 text-3xl md:text-4xl font-bold text-amber-400">OWL</h1>
          <p class="mt-3 text-slate-300 text-sm md:text-base">
            Click to start a new retinal fundus capture workflow.
          </p>
          <span class="mt-6 inline-flex items-center gap-2 rounded-xl bg-amber-500 px-5 py-2.5 text-sm font-semibold text-slate-900 shadow-lg shadow-amber-500/25 transition-all duration-150 group-hover:bg-amber-400 group-hover:shadow-amber-400/35">
            Enter System
            <svg class="w-4 h-4 transition-transform duration-150 group-hover:translate-x-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
            </svg>
          </span>
        </div>
      </div>
    </a>
  </main>
</body>
</html>
